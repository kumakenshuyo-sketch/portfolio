    <section class="contact">
        <form>
            <div class="title">
                <img class="icon" src="images/icon_db.png" alt="メールのアイコン"> Contact<span class="space-right">お問い合わせ</span>
            </div>
            <div class="box">    
                <table>
                    <tr>
                        <th><div>お名前<span class="Required">必須</span></div></th>
                        <td><input type="text"name="subject" placeholder="例）鈴木　一郎"></td>
                    </tr>
                    <tr>
                    <th><div>ふりがな<span class="Required"> 必須</span></div></th>
                        <td><input type="text"name="subject" placeholder="例）すずき　いちろう"></td>
                    </tr>
                    <tr>
                        <th><div>メールアドレス<span class="Required"> 必須</span></div></th>
                        <td><input type="email"name="email" placeholder="例）websenyo@gmail.com"></td>
                    </tr>
                    <tr>
                        <th><div>会社名<span class="any"> 任意</span></div></th>
                        <td><input type="email"name="email" placeholder="例）株式会社〇〇"></td>
                    </tr>
                    <tr>
                        <th><div>お問い合わせ内容<span class="Required"> 必須</span></div></th>
                        <td><textarea name="message" placeholder="例）お問い合わせ内容をご記入ください"></textarea></td>
                    </tr>  
                    <tr>
                        <th></th>
                        <td><input type="submit" value="この内容で送信する" class="submit"></div></td>
                    </tr>      
                </table>
            </div>
        </form>
